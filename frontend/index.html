<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; object-src 'none'; connect-src 'self';"
  />
  <title>Employee Management Dashboard</title>
  <meta name="description" content="Employee Management Dashboard — add, view, edit, and delete employees." />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div>
        <h1 class="header__title">Employees</h1>
        <p class="header__sub">Manage your team</p>
      </div>
      <button id="btn-add" class="btn btn--primary" type="button">+ Add Employee</button>
    </header>

    <!-- Stats -->
    <section class="stats" aria-label="Statistics">
      <div class="stat-card" id="stat-total">
        <span class="stat-card__label">Total</span>
        <span class="stat-card__value" id="val-total">0</span>
      </div>
      <div class="stat-card" id="stat-active">
        <span class="stat-card__label">Active</span>
        <span class="stat-card__value stat-card__value--green" id="val-active">0</span>
      </div>
      <div class="stat-card" id="stat-inactive">
        <span class="stat-card__label">Inactive</span>
        <span class="stat-card__value stat-card__value--red" id="val-inactive">0</span>
      </div>
      <div class="stat-card" id="stat-dept">
        <span class="stat-card__label">Departments</span>
        <span class="stat-card__value stat-card__value--blue" id="val-dept">0</span>
      </div>
    </section>

    <!-- Employee Table -->
    <section class="panel" aria-label="Employee list">
      <div class="panel__header">
        <h2 class="panel__title">All Employees</h2>
        <input type="text" id="search-input" class="search-input" placeholder="Search employees..." aria-label="Search employees" />
      </div>
      <div class="table-wrap">
        <table class="table" id="emp-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Department</th>
              <th>Designation</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="emp-tbody"></tbody>
        </table>
        <div class="empty" id="empty-state" style="display:none;">
          <p>No employees yet. Click <strong>+ Add Employee</strong> to get started.</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Add/Edit Modal -->
  <div class="overlay" id="form-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal__head">
        <h3 id="modal-title">Add Employee</h3>
        <button class="modal__x" id="modal-x" type="button" aria-label="Close">✕</button>
      </div>
      <form id="emp-form" class="modal__body" novalidate>
        <input type="hidden" id="f-id" />
        <div class="field-row">
          <div class="field">
            <label for="f-name">Name</label>
            <input id="f-name" type="text" placeholder="Full name" required />
            <span class="field__err" id="err-name"></span>
          </div>
          <div class="field">
            <label for="f-email">Email</label>
            <input id="f-email" type="email" placeholder="name@company.com" required />
            <span class="field__err" id="err-email"></span>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-phone">Phone</label>
            <input id="f-phone" type="tel" placeholder="+1 234 567 8900" />
          </div>
          <div class="field">
            <label for="f-dept">Department</label>
            <select id="f-dept" required>
              <option value="">Select</option>
              <option value="Engineering">Engineering</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
              <option value="Sales">Sales</option>
              <option value="Human Resources">Human Resources</option>
              <option value="Finance">Finance</option>
              <option value="Operations">Operations</option>
            </select>
            <span class="field__err" id="err-dept"></span>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-desig">Designation</label>
            <input id="f-desig" type="text" placeholder="Job title" required />
            <span class="field__err" id="err-desig"></span>
          </div>
          <div class="field">
            <label for="f-joined">Date of Joining</label>
            <input id="f-joined" type="date" required />
            <span class="field__err" id="err-joined"></span>
          </div>
        </div>
        <div class="field">
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </form>
      <div class="modal__foot">
        <button class="btn btn--ghost" id="modal-cancel" type="button">Cancel</button>
        <button class="btn btn--primary" id="modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="overlay" id="del-overlay">
    <div class="modal modal--sm" role="alertdialog" aria-modal="true" aria-labelledby="del-title">
      <div class="modal__head">
        <h3 id="del-title">Delete Employee</h3>
        <button class="modal__x" id="del-x" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal__body modal__body--center">
        <p>Are you sure you want to delete <strong id="del-name"></strong>?</p>
      </div>
      <div class="modal__foot">
        <button class="btn btn--ghost" id="del-cancel" type="button">Cancel</button>
        <button class="btn btn--danger" id="del-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toasts" class="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
